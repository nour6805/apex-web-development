<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Apex Web Development – Chat Assistant</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --bg: #0a0a0f;
      --surface: #13131c;
      --surface2: #1c1c2a;
      --border: #2a2a3d;
      --accent: #6c63ff;
      --accent2: #00e5c3;
      --text: #e8e8f0;
      --text-muted: #7a7a9a;
      --user-bubble: #6c63ff;
      --bot-bubble: #1c1c2a;
      --radius: 18px;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--bg);
      color: var(--text);
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(108,99,255,0.04) 1px, transparent 1px),
        linear-gradient(90deg, rgba(108,99,255,0.04) 1px, transparent 1px);
      background-size: 40px 40px;
      pointer-events: none;
      z-index: 0;
    }

    body::after {
      content: '';
      position: fixed;
      width: 600px; height: 600px;
      background: radial-gradient(circle, rgba(108,99,255,0.12) 0%, transparent 70%);
      top: -100px; right: -100px;
      border-radius: 50%;
      pointer-events: none;
      z-index: 0;
    }

    header {
      position: relative;
      z-index: 10;
      background: rgba(19,19,28,0.9);
      backdrop-filter: blur(20px);
      border-bottom: 1px solid var(--border);
      padding: 16px 24px;
      display: flex;
      align-items: center;
      gap: 14px;
    }

    .logo-mark {
      width: 42px; height: 42px;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      border-radius: 12px;
      display: flex; align-items: center; justify-content: center;
      font-family: 'Syne', sans-serif;
      font-weight: 800;
      font-size: 18px;
      color: white;
      flex-shrink: 0;
      box-shadow: 0 0 20px rgba(108,99,255,0.4);
    }

    .header-info { flex: 1; }
    .header-info h1 {
      font-family: 'Syne', sans-serif;
      font-weight: 700;
      font-size: 17px;
      letter-spacing: -0.02em;
      color: var(--text);
    }
    .header-info p {
      font-size: 12px;
      color: var(--accent2);
      display: flex; align-items: center; gap: 5px;
      margin-top: 1px;
    }
    .status-dot {
      width: 7px; height: 7px;
      background: var(--accent2);
      border-radius: 50%;
      animation: pulse 2s infinite;
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50% { opacity: 0.5; transform: scale(0.8); }
    }

    #chat {
      position: relative;
      z-index: 5;
      flex: 1;
      overflow-y: auto;
      padding: 28px 20px;
      display: flex;
      flex-direction: column;
      gap: 16px;
      scroll-behavior: smooth;
    }

    #chat::-webkit-scrollbar { width: 4px; }
    #chat::-webkit-scrollbar-track { background: transparent; }
    #chat::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

    .message {
      display: flex;
      gap: 10px;
      animation: fadeUp 0.3s ease both;
      max-width: 760px;
      width: 100%;
    }
    .message.user { align-self: flex-end; flex-direction: row-reverse; }
    .message.bot  { align-self: flex-start; }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(10px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .avatar {
      width: 34px; height: 34px;
      border-radius: 10px;
      flex-shrink: 0;
      display: flex; align-items: center; justify-content: center;
      font-size: 14px;
      font-weight: 700;
      font-family: 'Syne', sans-serif;
    }
    .bot .avatar {
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      color: white;
      box-shadow: 0 0 12px rgba(108,99,255,0.3);
    }
    .user .avatar {
      background: var(--surface2);
      color: var(--text-muted);
      border: 1px solid var(--border);
    }

    .bubble {
      padding: 13px 17px;
      border-radius: var(--radius);
      font-size: 14.5px;
      line-height: 1.65;
      max-width: calc(100% - 50px);
    }
    .bot .bubble {
      background: var(--bot-bubble);
      border: 1px solid var(--border);
      border-top-left-radius: 4px;
      color: var(--text);
    }
    .user .bubble {
      background: var(--user-bubble);
      color: white;
      border-top-right-radius: 4px;
    }

    .typing-indicator {
      display: flex; align-items: center; gap: 4px;
      padding: 14px 17px;
      background: var(--bot-bubble);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      border-top-left-radius: 4px;
      width: fit-content;
    }
    .typing-indicator span {
      width: 7px; height: 7px;
      background: var(--text-muted);
      border-radius: 50%;
      animation: typing 1.2s infinite;
    }
    .typing-indicator span:nth-child(2) { animation-delay: 0.2s; }
    .typing-indicator span:nth-child(3) { animation-delay: 0.4s; }
    @keyframes typing {
      0%, 60%, 100% { transform: translateY(0); opacity: 0.4; }
      30% { transform: translateY(-5px); opacity: 1; }
    }

    .quick-replies {
      display: flex; flex-wrap: wrap; gap: 8px;
      margin-top: 4px;
      padding-left: 44px;
    }
    .qr-btn {
      padding: 7px 14px;
      background: transparent;
      border: 1px solid var(--accent);
      color: var(--accent);
      border-radius: 50px;
      font-size: 12.5px;
      font-family: 'DM Sans', sans-serif;
      cursor: pointer;
      transition: all 0.2s;
    }
    .qr-btn:hover {
      background: var(--accent);
      color: white;
    }

    footer {
      position: relative;
      z-index: 10;
      background: rgba(19,19,28,0.95);
      backdrop-filter: blur(20px);
      border-top: 1px solid var(--border);
      padding: 16px 20px;
    }

    .input-row {
      display: flex; gap: 10px; align-items: flex-end;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 10px 10px 10px 16px;
      transition: border-color 0.2s;
    }
    .input-row:focus-within { border-color: var(--accent); }

    #userInput {
      flex: 1;
      background: transparent;
      border: none;
      outline: none;
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      font-size: 14.5px;
      resize: none;
      max-height: 120px;
      line-height: 1.5;
    }
    #userInput::placeholder { color: var(--text-muted); }

    #sendBtn {
      width: 38px; height: 38px;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      border: none;
      border-radius: 10px;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: transform 0.15s, opacity 0.15s;
      flex-shrink: 0;
    }
    #sendBtn:hover { transform: scale(1.05); }
    #sendBtn:active { transform: scale(0.95); }
    #sendBtn:disabled { opacity: 0.4; cursor: not-allowed; }
    #sendBtn svg { fill: white; }

    .footer-note {
      text-align: center;
      font-size: 11px;
      color: var(--text-muted);
      margin-top: 8px;
    }
  </style>
</head>
<body>

<header>
  <div class="logo-mark">AX</div>
  <div class="header-info">
    <h1>Apex Web Development</h1>
    <p><span class="status-dot"></span> AI Assistant · Online</p>
  </div>
</header>

<div id="chat"></div>

<footer>
  <div class="input-row">
    <textarea id="userInput" placeholder="Ask me about our services…" rows="1"></textarea>
    <button id="sendBtn">
      <svg width="17" height="17" viewBox="0 0 24 24"><path d="M2 21l21-9L2 3v7l15 2-15 2z"/></svg>
    </button>
  </div>
  <p class="footer-note">Powered by Apex Web Development AI · Contact: 76766199</p>
</footer>

<script src="chat.js"></script>

</body>
</html>
